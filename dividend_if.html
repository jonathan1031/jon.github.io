<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股利自動核算系統 - dividend_if</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; color: #333; }
        .main-container { max-width: 900px; margin-top: 50px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .result-table-container { background: white; border-radius: 12px; overflow: hidden; }
        .total-banner { 
            background: linear-gradient(135deg, #0d6efd 0%, #003d99 100%); 
            color: white; border-radius: 15px; padding: 25px; margin-top: 20px; 
        }
        #loading { display: none; }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="text-center mb-5">
        <h2 class="fw-bold">個人庫存股利試算系統</h2>
        <p class="text-muted">自動匹配股票名稱與年度收益</p>
    </div>

    <div class="card p-4 mb-4">
        <label class="form-label fw-bold mb-3">1. 上傳庫存配置檔 (.txt)</label>
        <input type="file" id="fileInput" class="form-control mb-3" accept=".txt">
        <button onclick="processFile()" id="btnRun" class="btn btn-primary w-100 py-2 fw-bold">開始批次試算</button>
    </div>

    <div id="loading" class="text-center p-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 fw-bold" id="loadingText">正在準備系統資料...</p>
    </div>

    <div id="resultArea" style="display:none;">
        <div class="result-table-container p-3 mb-4 shadow-sm">
            <h5 class="mb-3 border-bottom pb-2 fw-bold">
                <span id="displayYear" class="text-primary"></span> 資產收益明細
            </h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>股票名稱</th>
                            <th>持有數量</th>
                            <th class="text-end">每股股利</th>
                            <th class="text-end">小計 (總股利)</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="total-banner shadow">
            <h5 class="opacity-75">清單內所有項目總預計收益</h5>
            <h1 id="grandTotal" class="fw-bold mb-0 text-warning">$0</h1>
        </div>
    </div>
</div>

<script>
let stockMap = {}; // 用於儲存 代碼 -> 名稱 的對照表

// 頁面載入時先抓取股票名稱清單
async function fetchStockNames(token) {
    try {
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo&token=${token}`;
        const response = await fetch(url);
        const res = await response.json();
        if (res.data) {
            res.data.forEach(item => {
                stockMap[item.stock_id] = item.stock_name;
            });
        }
    } catch (e) {
        console.error("無法取得股票名稱清單", e);
    }
}

async function processFile() {
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files.length) return alert("請先選取 TXT 檔案！");

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function(e) {
        const text = e.target.result;
        const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
        
        let apiToken = "";
        let targetYear = ""; 
        const portfolio = [];

        lines.forEach(line => {
            if (line.toUpperCase().startsWith("TOKEN:")) {
                apiToken = line.split(':')[1].trim();
            } else if (line.toUpperCase().startsWith("YEAR:")) {
                targetYear = line.split(':')[1].trim();
            } else {
                const parts = line.split(',');
                if (parts.length >= 2) {
                    portfolio.push({
                        id: parts[0].trim(),
                        shares: parseFloat(parts[1].trim())
                    });
                }
            }
        });

        if (!apiToken || !targetYear) return alert("檔案格式錯誤 (缺少 TOKEN 或 YEAR)");

        // 顯示載入中
        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';
        
        // 如果還沒抓過名稱，先抓一次
        if (Object.keys(stockMap).length === 0) {
            document.getElementById('loadingText').innerText = "獲取台股名稱清單中...";
            await fetchStockNames(apiToken);
        }

        await runAnalysis(apiToken, portfolio, targetYear);
    };

    reader.readAsText(file);
}

async function runAnalysis(token, portfolio, year) {
    const tbody = document.getElementById('stockTableBody');
    const grandTotalLabel = document.getElementById('grandTotal');
    const displayYear = document.getElementById('displayYear');
    const btn = document.getElementById('btnRun');

    tbody.innerHTML = "";
    displayYear.innerText = year + " 年";
    let finalSum = 0;

    try {
        for (const stock of portfolio) {
            document.getElementById('loadingText').innerText = `正在分析: ${stock.id} ${stockMap[stock.id] || ''}...`;
            
            const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockDividend&data_id=${stock.id}&start_date=${year}-01-01&end_date=${year}-12-31&token=${token}`;
            
            const response = await fetch(url);
            const resData = await response.json();
            
            let yearTotalDividend = 0;
            if (resData.data && resData.data.length > 0) {
                resData.data.forEach(item => {
                    const cash = parseFloat(item.CashEarningsDistribution || item.CashDividend || 0);
                    yearTotalDividend += cash;
                });
            }

            const stockName = stockMap[stock.id] || "未知股票";
            const stockTotalMoney = yearTotalDividend * (stock.shares * 1000);
            finalSum += stockTotalMoney;

            tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="fw-bold">${stockName}</div>
                        <div class="small text-muted">${stock.id}</div>
                    </td>
                    <td>${stock.shares} 張</td>
                    <td class="text-end text-primary">${yearTotalDividend.toFixed(2)} 元</td>
                    <td class="text-end fw-bold text-success">$${Math.round(stockTotalMoney).toLocaleString()}</td>
                </tr>
            `;
            
            await new Promise(r => setTimeout(r, 200));
        }

        grandTotalLabel.innerText = `$${Math.round(finalSum).toLocaleString()}`;
        document.getElementById('resultArea').style.display = 'block';

    } catch (err) {
        alert("計算失敗，請檢查網路或 Token。");
    } finally {
        document.getElementById('loading').style.display = 'none';
        btn.disabled = false;
    }
}
</script>

</body>
</html>
