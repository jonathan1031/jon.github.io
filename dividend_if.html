<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股利自動核算系統 - dividend_if</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; color: #333; }
        .main-container { max-width: 900px; margin-top: 50px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .result-table-container { background: white; border-radius: 12px; overflow: hidden; }
        .total-banner { 
            background: linear-gradient(135deg, #0d6efd 0%, #003d99 100%); 
            color: white; border-radius: 15px; padding: 25px; margin-top: 20px; 
        }
        #loading { display: none; }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="text-center mb-5">
        <h2 class="fw-bold">個人庫存股利試算系統</h2>
        <p class="text-muted">自動匹配股票名稱與年度收益</p>
    </div>

    <div class="card p-4 mb-4">
        <label class="form-label fw-bold mb-3">1. 上傳庫存配置檔 (.txt)</label>
        <input type="file" id="fileInput" class="form-control mb-3" accept=".txt">
        <button onclick="processFile()" id="btnRun" class="btn btn-primary w-100 py-2 fw-bold">開始批次試算</button>
    </div>

    <div id="loading" class="text-center p-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 fw-bold" id="loadingText">正在準備系統資料...</p>
    </div>

    <div id="resultArea" style="display:none;">
        <div class="result-table-container p-3 mb-4 shadow-sm">
            <h5 class="mb-3 border-bottom pb-2 fw-bold">
                <span id="displayYear" class="text-primary"></span> 資產收益明細
            </h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>股票名稱</th>
                            <th>持有數量</th>
                            <th class="text-end">每股股利</th>
                            <th class="text-end">小計 (總股利)</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="total-banner shadow">
            <h5 class="opacity-75">清單內所有項目總預計收益</h5>
            <h1 id="grandTotal" class="fw-bold mb-0 text-warning">$0</h1>
        </div>
    </div>
</div>

<script>
let stockMap = {}; // 用於儲存 代碼 -> 名稱 的對照表

// 頁面載入時先抓取股票名稱清單
async function fetchStockNames(token) {
    try {
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo&token=${token}`;
        const response = await fetch(url);
        const res = await response.json();
        if (res.data) {
            res.data.forEach(item => {
                stockMap[item.stock_id] = item.stock_name;
            });
        }
    } catch (e) {
        console.error("無法取得股票名稱清單", e);
    }
}

async function processFile() {
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files.length) return alert("請先選取 TXT 檔案！");

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async function(e) {
        const text = e.target.result;
        const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
        
        let apiToken = "";
        let targetYear = ""; 
        const portfolio = [];

        lines.forEach(line => {
            if (line.toUpperCase().startsWith("TOKEN:")) {
                apiToken = line.split(':')[1].trim();
            } else if (line.toUpperCase().startsWith("YEAR:")) {
                targetYear = line.split(':')[1].trim();
            } else {
                const parts = line.split(',');
                if (parts.length >= 2) {
                    portfolio.push({
                        id: parts[0].trim(),
                        shares: parseFloat(parts[1].trim())
                    });
                }
            }
        });

        if (!apiToken || !targetYear) return alert("檔案格式錯誤 (缺少 TOKEN 或 YEAR)");

        // 顯示載入中
        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';
        
        // 如果還沒抓過名稱，先抓一次
        if (Object.keys(stockMap).length === 0) {
            document.getElementById('loadingText').innerText = "獲取台股名稱清單中...";
            await fetchStockNames(apiToken);
        }

        await runAnalysis(apiToken, portfolio, targetYear);
    };

    reader.readAsText(file);
}

async function runAnalysis(token, portfolio, year) {
    const tbody = document.getElementById('stockTableBody');
    tbody.innerHTML = "";
    document.getElementById('displayYear').innerText = year + " 年";
    let finalSum = 0;

    for (const stock of portfolio) {
        const sid = stock.id.toUpperCase();
        console.group(`🔍 正在分析標的: ${sid}`);
        
        let yearTotalDividend = 0;

        // 統一使用 TaiwanStockDividend，這個資料集通常支援 CORS 且包含債券配息
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockDividend&data_id=${sid}&start_date=${year}-01-01&end_date=${year}-12-31&token=${token}`;
        
        try {
            const response = await fetch(url);
            const res = await response.json();
            console.log(`📡 API 回傳結果:`, res);
            
            if (res.data && res.data.length > 0) {
                res.data.forEach(item => {
                    // 關鍵修正：債券 ETF 在此資料集的配息欄位通常是 CashDividend 或 CashEarningsDistribution
                    // 我們把所有可能的數值加總 (有些債券會拆成多筆記錄)
                    const div = parseFloat(item.CashEarningsDistribution || item.CashDividend || item.dividend || 0);
                    yearTotalDividend += div;
                });
            } else {
                console.warn(`⚠️ ${sid} 在 ${year} 年查無資料`);
            }
        } catch (err) { 
            console.error(`❌ ${sid} 請求失敗`, err); 
        }

        console.log(`📈 年度累積每股股利: ${yearTotalDividend}`);
        
        const isBond = sid.endsWith('B');
        const name = stockMap[sid] || (isBond ? "債券型 ETF" : "未知股票");
        const stockSum = yearTotalDividend * (stock.shares * 1000);
        finalSum += stockSum;

        tbody.innerHTML += `
            <tr>
                <td><div class="fw-bold">${name}</div><div class="small text-muted">${sid}</div></td>
                <td>${stock.shares} 張</td>
                <td class="text-end text-primary">${yearTotalDividend.toFixed(4)} 元</td>
                <td class="text-end fw-bold text-success">$${Math.round(stockSum).toLocaleString()}</td>
            </tr>
        `;
        console.groupEnd();
        // 稍微拉長延遲，確保 API 穩定
        await new Promise(r => setTimeout(r, 500));
    }

    document.getElementById('grandTotal').innerText = `$${Math.round(finalSum).toLocaleString()}`;
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btnRun').disabled = false;
}
</script>

</body>
</html>
