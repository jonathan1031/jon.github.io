<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股利自動核算系統 - dividend_if</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .main-container { max-width: 950px; margin-top: 30px; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #loading { display: none; }
        .btn-excel { background-color: #198754; color: white; }
        .btn-excel:hover { background-color: #157347; color: white; }
        /* 總金額橫幅樣式 */
        .summary-banner { 
            background: linear-gradient(135deg, #0d6efd 0%, #003d99 100%); 
            color: white; border-radius: 15px; padding: 20px; 
        }
    </style>
</head>
<body>

<div class="container main-container">
    <div class="text-center mb-4">
        <h2 class="fw-bold">年度股利自動試算系統</h2>
    </div>

    <div class="card p-4 mb-4">
        <div class="row g-3">
            <div class="col-md-9">
                <input type="file" id="fileInput" class="form-control" accept=".txt">
            </div>
            <div class="col-md-3">
                <button onclick="processFile()" id="btnRun" class="btn btn-primary w-100 fw-bold">開始計算</button>
            </div>
        </div>
    </div>

    <div id="loading" class="text-center p-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 fw-bold" id="loadingText">分析資料中...</p>
    </div>

    <div id="resultArea" style="display:none;">
        
        <div class="summary-banner shadow mb-4 text-center">
            <h5 class="opacity-75 mb-1"><span id="summaryYear"></span> 年度預估總收益</h5>
            <h1 id="grandTotal" class="fw-bold mb-0 text-warning">$0</h1>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold text-primary mb-0">資產收益明細</h5>
            <button onclick="exportToExcel()" class="btn btn-excel fw-bold btn-sm">
                匯出 Excel 報表
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle bg-white shadow-sm rounded">
                <thead class="table-light">
                    <tr>
                        <th>股票/債券名稱</th>
                        <th>代碼</th>
                        <th>持有張數</th>
                        <th class="text-end">每股股利總計</th>
                        <th class="text-end">預計總收益</th>
                    </tr>
                </thead>
                <tbody id="stockTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let stockMap = {}; 
let exportData = []; 
let currentYear = "";

async function fetchStockNames(token) {
    try {
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo&token=${token}`;
        const res = await (await fetch(url)).json();
        if (res.data) res.data.forEach(item => { stockMap[item.stock_id] = item.stock_name; });
    } catch (e) { console.error("名稱清單抓取失敗"); }
}

async function processFile() {
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files.length) return alert("請選取 TXT 檔案");

    const reader = new FileReader();
    reader.onload = async function(e) {
        const lines = e.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
        let apiToken = "", targetYear = "";
        const portfolio = [];

        lines.forEach(line => {
            if (line.toUpperCase().startsWith("TOKEN:")) apiToken = line.split(':')[1].trim();
            else if (line.toUpperCase().startsWith("YEAR:")) targetYear = line.split(':')[1].trim();
            else {
                const parts = line.split(',');
                if (parts.length >= 2) portfolio.push({ id: parts[0].trim(), shares: parseFloat(parts[1].trim()) });
            }
        });

        if (!apiToken || !targetYear) return alert("檔案內容缺少 TOKEN 或 YEAR");
        currentYear = targetYear;

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';
        if (Object.keys(stockMap).length === 0) await fetchStockNames(apiToken);
        await runAnalysis(apiToken, portfolio, targetYear);
    };
    reader.readAsText(fileInput.files[0]);
}

async function runAnalysis(token, portfolio, year) {
    const tbody = document.getElementById('stockTableBody');
    tbody.innerHTML = "";
    exportData = []; 
    let finalSum = 0;

    for (const stock of portfolio) {
        const sid = stock.id.toUpperCase();
        const isBond = sid.endsWith('B');
        const dataset = isBond ? 'TaiwanStockDividendResult' : 'TaiwanStockDividend';
        
        let yearTotalDividend = 0;
        const url = `https://api.finmindtrade.com/api/v4/data?dataset=${dataset}&data_id=${sid}&start_date=${year}-01-01&end_date=${year}-12-31&token=${token}`;
        
        try {
            const response = await fetch(url);
            const res = await response.json();
            if (res.data && res.data.length > 0) {
                res.data.forEach(item => {
                    yearTotalDividend += parseFloat(item.stock_and_cache_dividend || item.dividend || item.CashEarningsDistribution || item.CashDividend || 0);
                });
            }
        } catch (err) { console.error(`${sid} 請求失敗`, err); }

        const name = stockMap[sid] || (isBond ? "債券型 ETF" : "未知股票");
        const stockSum = Math.round(yearTotalDividend * (stock.shares * 1000));
        finalSum += stockSum;

        exportData.push({
            "股票/債券名稱": name,
            "代碼": sid,
            "持有張數": stock.shares,
            "每股股利": parseFloat(yearTotalDividend.toFixed(4)),
            "小計收益": stockSum
        });

        tbody.innerHTML += `
            <tr>
                <td><div class="fw-bold">${name}</div></td>
                <td class="text-muted">${sid}</td>
                <td>${stock.shares} 張</td>
                <td class="text-end text-primary">${yearTotalDividend.toFixed(4)} 元</td>
                <td class="text-end fw-bold text-success">$${stockSum.toLocaleString()}</td>
            </tr>
        `;
        await new Promise(r => setTimeout(r, 500));
    }

    // 修改點 2: Excel 報表加入總領取金額 (在陣列最後增加總計列)
    exportData.push({
        "股票/債券名稱": "總計預計收益",
        "代碼": "",
        "持有張數": "",
        "每股股利": "",
        "小計收益": finalSum
    });

    document.getElementById('summaryYear').innerText = year;
    document.getElementById('grandTotal').innerText = `$${Math.round(finalSum).toLocaleString()}`;
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
}

function exportToExcel() {
    if (exportData.length === 0) return alert("沒有資料可匯出");
    const ws = XLSX.utils.json_to_sheet(exportData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "股利清單");
    XLSX.writeFile(wb, `${currentYear}_股利試算報表.xlsx`);
}
</script>

</body>
</html>
