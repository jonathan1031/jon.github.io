<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMind 股利計算工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .result-card { display: none; }
        .table { vertical-align: middle; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">年度股利自動試算</h1>
        <p class="text-muted">利用 FinMind API 快速計算庫存資產收益</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 mb-4">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-bold text-primary">1. FinMind API Token</label>
                        <input type="password" id="apiToken" class="form-control" placeholder="在此貼上您的私密 Token">
                        <div class="form-text">尚未有 Token？請至 <a href="https://finmindtrade.com/" target="_blank">FinMind 官網</a> 免費註冊領取。</div>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-bold">2. 股票代碼</label>
                        <input type="text" id="stockId" class="form-control" placeholder="例如: 2330" value="2330">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-bold">3. 持股張數</label>
                        <input type="number" id="shares" class="form-control" value="1" step="0.1">
                    </div>

                    <div class="col-12 mt-4">
                        <button onclick="calculateDividend()" id="btnSubmit" class="btn btn-primary w-100 py-2 fw-bold">
                            開始計算股利
                        </button>
                    </div>
                </div>
            </div>

            <div id="resultArea" class="card p-4 result-card">
                <h4 class="mb-3 border-bottom pb-2">試算結果 <span id="displayStock" class="badge bg-secondary ms-2"></span></h4>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>配息年份</th>
                                <th class="text-end">每股現金總額</th>
                                <th class="text-end">預計領取金額 (TWD)</th>
                            </tr>
                        </thead>
                        <tbody id="resultTable">
                            </tbody>
                    </table>
                </div>
                <div class="alert alert-info mt-3 small">
                    註：本工具僅計算「現金股利」，不含股票股利。金額採四捨五入計算。
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function calculateDividend() {
    const btn = document.getElementById('btnSubmit');
    const stockId = document.getElementById('stockId').value.trim();
    const numShares = parseFloat(document.getElementById('shares').value) * 1000;
    const apiToken = document.getElementById('apiToken').value.trim();

    if (!apiToken || !stockId) {
        alert("請確認 Token 與 股票代碼 皆已輸入！");
        return;
    }

    // 顯示讀取狀態
    btn.disabled = true;
    btn.innerText = "資料讀取中...";

    // 構建 API URL (TaiwanStockDividend)
    // 預設抓取 2020 至今的資料
    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockDividend&data_id=${stockId}&start_date=2020-01-01&token=${apiToken}`;

    try {
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.status !== 200) {
            throw new Error(result.msg || "API 請求失敗");
        }

        const data = result.data;
        if (!data || data.length === 0) {
            alert("查無此股票之股利資料，請確認代碼是否正確。");
            return;
        }

        // --- 核心逻辑：處理 NaN 與 年度加總 ---
        const yearlySum = {};
        
        data.forEach(item => {
            // 解析年份 (從 date 欄位抓取前四碼)
            const year = item.date ? item.date.substring(0, 4) : "Unknown";
            
            // 重要：修正 NaN 關鍵點
            // FinMind 欄位為 CashDividend (注意大小寫)
            const cashVal = parseFloat(item.CashDividend);
            
            // 如果 cashVal 是數字才加總，否則當作 0
            if (!isNaN(cashVal)) {
                yearlySum[year] = (yearlySum[year] || 0) + cashVal;
            }
        });

        // 渲染畫面
        document.getElementById('displayStock').innerText = stockId;
        const tbody = document.getElementById('resultTable');
        tbody.innerHTML = "";
        
        // 將年份由新到舊排序
        const sortedYears = Object.keys(yearlySum).sort((a, b) => b - a);

        sortedYears.forEach(year => {
            const perShareTotal = yearlySum[year];
            const totalEstimated = perShareTotal * numShares;
            
            const row = `
                <tr>
                    <td class="fw-bold">${year} 年</td>
                    <td class="text-end text-primary">${perShareTotal.toFixed(2)} 元</td>
                    <td class="text-end fw-bold text-success">$${Math.round(totalEstimated).toLocaleString()}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        // 顯示結果卡片
        document.getElementById('resultArea').style.display = 'block';

    } catch (error) {
        console.error("Error Detail:", error);
        alert("錯誤: " + error.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "開始計算股利";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
