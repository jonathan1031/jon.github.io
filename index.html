<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMind 股利計算工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .result-card { display: none; }
        .table { vertical-align: middle; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">年度股利自動試算</h1>
        <p class="text-muted">利用 FinMind API 快速計算庫存資產收益</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 mb-4">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-bold text-primary">1. FinMind API Token</label>
                        <input type="password" id="apiToken" class="form-control" placeholder="在此貼上您的私密 Token">
                        <div class="form-text">尚未有 Token？請至 <a href="https://finmindtrade.com/" target="_blank">FinMind 官網</a> 免費註冊領取。</div>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-bold">2. 股票代碼</label>
                        <input type="text" id="stockId" class="form-control" placeholder="例如: 2330" value="2330">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-bold">3. 持股張數</label>
                        <input type="number" id="shares" class="form-control" value="1" step="0.1">
                    </div>

                    <div class="col-12 mt-4">
                        <button onclick="calculateDividend()" id="btnSubmit" class="btn btn-primary w-100 py-2 fw-bold">
                            開始計算股利
                        </button>
                    </div>
                </div>
            </div>

            <div id="resultArea" class="card p-4 result-card">
                <h4 class="mb-3 border-bottom pb-2">試算結果 <span id="displayStock" class="badge bg-secondary ms-2"></span></h4>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>配息年份</th>
                                <th class="text-end">每股現金總額</th>
                                <th class="text-end">預計領取金額 (TWD)</th>
                            </tr>
                        </thead>
                        <tbody id="resultTable">
                            </tbody>
                    </table>
                </div>
                <div class="alert alert-info mt-3 small">
                    註：本工具僅計算「現金股利」，不含股票股利。金額採四捨五入計算。
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function calculateDividend() {
    const btn = document.getElementById('btnSubmit');
    const stockId = document.getElementById('stockId').value.trim();
    const numShares = parseFloat(document.getElementById('shares').value) * 1000;
    const apiToken = document.getElementById('apiToken').value.trim();
    const resultArea = document.getElementById('resultArea');
    const tbody = document.getElementById('resultTable'); // 確保一開始就先取得元件

    if (!apiToken || !stockId) {
        alert("請確認 Token 與 股票代碼 皆已輸入！");
        return;
    }

    // 初始化狀態
    btn.disabled = true;
    btn.innerText = "資料讀取中...";
    tbody.innerHTML = ""; 

    // 設定起始日期（建議設早一點，確保有資料）
    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockDividend&data_id=${stockId}&start_date=2020-01-01&token=${apiToken}`;

    try {
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.status !== 200) throw new Error(result.msg || "API 錯誤");

        const data = result.data;
        if (!data || data.length === 0) {
            alert("該股票在此期間內無配息資料。");
            return;
        }

// --- 暴力解析版加總邏輯 ---
        const yearlySum = {};
        
        console.log("偵測到 API 資料條數:", data.length);
        console.log("第一筆資料內容範例:", data[0]); // 這行會在 Console 印出真相

        data.forEach(item => {
            // 1. 抓取年份 (優先找 date 或 Date)
            const dateStr = item.date || item.Date || "";
            const year = dateStr.substring(0, 4);
            
            if (year && year.length === 4) {
                // 2. 暴力搜尋：嘗試所有可能的現金股利欄位名稱
                // 有些版本回傳 CashDividend，有些可能是 cash_dividend
                let cashVal = parseFloat(
                    item.CashDividend ?? 
                    item.cash_dividend ?? 
                    item.cashDividend ?? 
                    item.Cash_Dividend ?? 0
                );

                // 3. 額外檢查：如果上面都抓不到，且該物件只有兩個欄位（通常其中一個就是股利）
                if (isNaN(cashVal) || cashVal === 0) {
                    for (let key in item) {
                        if (key.toLowerCase().includes('dividend') && !key.toLowerCase().includes('date')) {
                            cashVal = parseFloat(item[key]);
                        }
                    }
                }
                
                if (!isNaN(cashVal) && cashVal > 0) {
                    yearlySum[year] = (yearlySum[year] || 0) + cashVal;
                }
            }
        });

        // 檢查是否有算出結果
        const sortedYears = Object.keys(yearlySum).sort((a, b) => b - a);
        if (sortedYears.length === 0) {
            tbody.innerHTML = "<tr><td colspan='3' class='text-center'>抓到了資料但無法解析股利數值，請檢查 API 欄位。</td></tr>";
        } else {
            document.getElementById('displayStock').innerText = stockId;
            sortedYears.forEach(year => {
                const perShare = yearlySum[year];
                const total = perShare * numShares;
                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold">${year} 年</td>
                        <td class="text-end text-primary">${perShare.toFixed(2)} 元</td>
                        <td class="text-end fw-bold text-success">$${Math.round(total).toLocaleString()}</td>
                    </tr>`;
            });
        }

        resultArea.style.display = 'block';

    } catch (error) {
        alert("發生錯誤: " + error.message);
        console.error(error);
    } finally {
        btn.disabled = false;
        btn.innerText = "開始計算股利";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
